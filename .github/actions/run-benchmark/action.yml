name: Run Benchmark
description: Run interactive zsh benchmark with zsh-bench and convert results

outputs:
  result-path:
    description: Path to the converted benchmark result JSON
    value: benchmark-result.json

runs:
  using: composite
  steps:
    - name: Install zsh-bench
      shell: bash
      run: bash .github/scripts/install-zsh-bench.sh "$RUNNER_TEMP/zsh-bench"

    - name: Run benchmark
      shell: bash
      run: |
        "$RUNNER_TEMP/zsh-bench/zsh-bench" \
          --raw \
          --iters "${ZSH_BENCH_ITERS:-16}" \
          > zsh-bench-result.txt

    - name: Convert to benchmark format
      shell: bash
      run: bash .github/scripts/convert-zsh-bench.sh zsh-bench-result.txt benchmark-result.json
